<style>
/* ── Tokens ──────────────────────────────────────────────────────── */
:root {
  --bg:    #0D0A18; --card:  #141020; --card2: #1C172E;
  --bdr:   rgba(255,255,255,0.08); --bdhi: rgba(255,255,255,0.14);
  --tx:    #F2EEFF; --sub:   rgba(242,238,255,0.50); --dim:  rgba(242,238,255,0.25);
  --acc:   oklch(68% 0.22 8);   --adim: oklch(68% 0.22 8 / 0.14);
  --vio:   oklch(72% 0.16 290); --vdim: oklch(72% 0.16 290 / 0.12);
  --grn:   oklch(72% 0.15 155); --gdim: oklch(72% 0.15 155 / 0.12);
  --r: 14px;
}
[data-theme="light"] {
  --bg:    #FAF8F3; --card:  #FFFFFF; --card2: #F2EFE7;
  --bdr:   rgba(12,8,28,0.09); --bdhi: rgba(12,8,28,0.18);
  --tx:    #0C081C; --sub:   rgba(12,8,28,0.55); --dim:  rgba(12,8,28,0.30);
  --acc:   oklch(50% 0.22 8);  --adim: oklch(50% 0.22 8 / 0.10);
  --vio:   oklch(45% 0.16 290);--vdim: oklch(45% 0.16 290 / 0.10);
  --grn:   oklch(45% 0.15 155);--gdim: oklch(45% 0.15 155 / 0.10);
}
/* ── Reset ───────────────────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;line-height:1.65;overflow-x:hidden;transition:background .35s,color .35s;}
a{color:inherit;text-decoration:none;} button{font-family:inherit;cursor:pointer;}
/* ── Scroll bar ──────────────────────────────────────────────────── */
#spbar{position:fixed;top:0;left:0;height:2px;background:var(--acc);z-index:9999;width:0;transition:width .08s;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--bdhi);border-radius:99px;}
/* ── Nav ─────────────────────────────────────────────────────────── */
.fnav{position:fixed;top:1.25rem;left:50%;transform:translateX(-50%);z-index:9000;
  display:flex;align-items:center;gap:1.5rem;padding:.6rem 1.75rem;
  background:oklch(9% 0.02 280 / 0.85);backdrop-filter:blur(18px);
  border:1px solid var(--bdr);border-radius:999px;transition:all .3s;white-space:nowrap;}
.fnav a{font-size:.78rem;font-weight:500;color:var(--sub);transition:color .2s;}
.fnav a:hover{color:var(--tx);}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--card2);border:1px solid var(--bdr);position:relative;transition:background .25s;}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--acc);transition:transform .25s;}
[data-theme="light"] .toggle::after{transform:translateX(16px);}
/* ── Section ─────────────────────────────────────────────────────── */
.sec{padding:5rem 0;} .wrap{max-width:1100px;margin:0 auto;padding:0 2rem;}
.sh{font-size:clamp(1.8rem,3vw,2.5rem);font-weight:700;text-align:center;letter-spacing:-.03em;}
.sh em{font-style:normal;color:var(--acc);}
.sp{text-align:center;color:var(--sub);margin-top:.75rem;font-size:.9rem;}
/* ── Card ────────────────────────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);transition:border-color .2s,box-shadow .2s;}
.card:hover{border-color:var(--bdhi);}
.card-glow:hover{border-color:var(--acc);box-shadow:0 0 0 1px var(--adim),0 12px 40px var(--adim);}
/* ── Tag ─────────────────────────────────────────────────────────── */
.tag{font-family:'DM Mono',monospace;font-size:.65rem;padding:.25rem .65rem;border:1px solid var(--bdr);border-radius:4px;color:var(--dim);}
/* ── Badge ───────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem .9rem;border-radius:999px;border:1px solid;font-size:.68rem;font-weight:600;letter-spacing:.08em;}
.badge-grn{border-color:var(--grn);background:var(--gdim);color:var(--grn);}
.badge-acc{border-color:var(--acc);background:var(--adim);color:var(--acc);}
.ping{width:8px;height:8px;border-radius:50%;background:var(--grn);position:relative;flex-shrink:0;}
.ping::before{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--grn);opacity:.4;animation:ping 1.5s infinite;}
@keyframes ping{0%{transform:scale(.8);opacity:.8;}100%{transform:scale(2.2);opacity:0;}}
/* ── Magic button ────────────────────────────────────────────────── */
@keyframes spin-conic{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.mbtn{position:relative;display:inline-block;padding:1px;border-radius:12px;overflow:hidden;}
.mbtn-glow{position:absolute;inset:-120%;background:conic-gradient(transparent 0%,var(--acc) 50%,transparent 60%);animation:spin-conic 3s linear infinite;}
.mbtn-inner{position:relative;background:var(--card2);border-radius:11px;padding:.75rem 2rem;display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.9rem;color:var(--tx);}
/* ── Copy pill ───────────────────────────────────────────────────── */
.copy-pill{display:flex;align-items:center;gap:.6rem;padding:.4rem 1rem;border:1px solid var(--bdr);border-radius:999px;background:var(--adim);cursor:pointer;font-size:.75rem;color:var(--sub);transition:all .2s;}
.copy-pill:hover{border-color:var(--bdhi);color:var(--tx);}
/* ── Bento ───────────────────────────────────────────────────────── */
.bento{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem;}
.b1{grid-column:span 3;grid-row:span 4;} .b2{grid-column:span 2;grid-row:span 2;}
.b3{grid-column:span 2;grid-row:span 2;} .b4{grid-column:span 2;}
.b5{grid-column:span 3;grid-row:span 2;} .b6{grid-column:span 2;}
@media(max-width:900px){.bento{grid-template-columns:1fr 1fr;}.b1,.b5{grid-column:span 2;}.b3,.b4,.b6{grid-column:span 1;}}
@media(max-width:600px){.bento{grid-template-columns:1fr;}.b1,.b2,.b3,.b4,.b5,.b6{grid-column:span 1;grid-row:span 1;}}
/* ── Marquee ─────────────────────────────────────────────────────── */
@keyframes mq{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.mq-wrap{overflow:hidden;} .mq-track{display:flex;width:max-content;animation:mq 18s linear infinite;gap:1rem;}
/* ── Status ──────────────────────────────────────────────────────── */
.status{display:inline-flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;}
.sdot{width:6px;height:6px;border-radius:50%;}
.s-live .sdot{background:var(--grn);box-shadow:0 0 6px var(--grn);} .s-live{color:var(--grn);}
.s-ship .sdot{background:var(--acc);}                                .s-ship{color:var(--acc);}
.s-wip  .sdot{background:var(--dim);}                                .s-wip{color:var(--dim);}
/* ── Timeline ────────────────────────────────────────────────────── */
.tl-line{position:absolute;left:1.5rem;top:.5rem;bottom:.5rem;width:1px;background:linear-gradient(to bottom,var(--acc),var(--vio) 50%,transparent);}
.tl-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:.25rem;box-shadow:0 0 0 4px var(--bg);}
/* ── Form ────────────────────────────────────────────────────────── */
.flabel{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:.45rem;}
.finput{width:100%;background:var(--card2);border:1px solid var(--bdr);color:var(--tx);font-family:inherit;font-size:.9rem;padding:.8rem 1rem;border-radius:8px;outline:none;transition:border-color .2s;resize:none;}
.finput:focus{border-color:var(--acc);}
.finput::placeholder{color:var(--dim);}
/* ── Guitar hologram ─────────────────────────────────────────────── */
@keyframes hfloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
@keyframes hscan{0%{top:-20%;opacity:0;}15%{opacity:.7;}85%{opacity:.4;}100%{top:110%;opacity:0;}}
.holo-w{position:relative;height:100%;display:flex;align-items:center;justify-content:center;min-height:300px;}
.holo-svg{animation:hfloat 4s ease-in-out infinite;filter:drop-shadow(0 0 7px var(--grn)) drop-shadow(0 0 20px oklch(72% 0.15 155 / 0.25));}
.holo-scan{position:absolute;left:0;right:0;height:3px;background:linear-gradient(to right,transparent,var(--grn),transparent);animation:hscan 3.5s ease-in-out infinite;}
.holo-grid-bg{position:absolute;inset:0;background-image:linear-gradient(var(--gdim) 1px,transparent 1px),linear-gradient(90deg,var(--gdim) 1px,transparent 1px);background-size:30px 30px;mask-image:radial-gradient(ellipse 70% 90% at 50% 50%,black 20%,transparent 75%);opacity:.3;}
/* ── Music bars ──────────────────────────────────────────────────── */
@keyframes mbar{0%,100%{scaleY:1;}50%{scaleY:1.8;}}
/* ── Tweaks ──────────────────────────────────────────────────────── */
.twp{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:1.25rem;width:215px;z-index:9998;box-shadow:0 8px 40px rgba(0,0,0,.35);}
.twh{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.18em;color:var(--acc);text-transform:uppercase;margin-bottom:1rem;}
.twr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;}
.twl{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--sub);}
.sw{width:18px;height:18px;border-radius:50%;border:2px solid transparent;transition:border-color .15s,transform .1s;}
.sw:hover{transform:scale(1.15);} .sw.on{border-color:var(--tx);}
/* ── Responsive ──────────────────────────────────────────────────── */
@media(max-width:700px){.fnav-links{display:none;}.hero-name{font-size:clamp(2.5rem,14vw,5rem);}.music-layout{grid-template-columns:1fr!important;}.hobby-grid{grid-template-columns:1fr!important;}.contact-grid{grid-template-columns:1fr!important;}.form-row{grid-template-columns:1fr!important;}}
</style>

<script type="text/babel">
function Stars(){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current; const ctx=c.getContext('2d');
    const resize=()=>{c.width=window.innerWidth;c.height=window.innerHeight;};
    resize(); window.addEventListener('resize',resize);
    const stars=Array.from({length:130},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.2+.3,a:Math.random(),da:(Math.random()-.5)*.004}));
    let raf;
    const tick=()=>{
      ctx.clearRect(0,0,c.width,c.height);
      stars.forEach(s=>{
        s.a=Math.max(.05,Math.min(.85,s.a+s.da));
        if(s.a<=.05||s.a>=.85)s.da*=-1;
        ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(242,238,255,${s.a*.65})`;ctx.fill();
      });
      raf=requestAnimationFrame(tick);
    };
    tick();
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}}/>;
}

function TextGen({text}){
  const [shown,setShown]=useState('');
  useEffect(()=>{
    let i=0; setShown('');
    const id=setInterval(()=>{setShown(text.slice(0,++i));if(i>=text.length)clearInterval(id);},55);
    return()=>clearInterval(id);
  },[text]);
  return <span>{shown}{shown.length<text.length&&<span style={{opacity:.7,animation:'blink 1s step-end infinite'}}>|</span>}</span>;
}

function MagicBtn({title,href}){

      </div>
    </a>
  );
}

<script type="text/babel">
function Globe(){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current; const ctx=c.getContext('2d');
    c.width=200;c.height=200;
    let angle=0;
    const draw=()=>{
      ctx.clearRect(0,0,200,200);
      const cx=100,cy=100,r=70;
      ctx.strokeStyle=`oklch(72% 0.16 290 / 0.6)`;
      ctx.lineWidth=1;
      // Globe outline
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      // Latitude lines
      for(let lat=-60;lat<=60;lat+=30){
        const y=cy+r*Math.sin(lat*Math.PI/180);
        const rx=r*Math.cos(lat*Math.PI/180);
        if(rx>0){ctx.beginPath();ctx.ellipse(cx,y,rx,rx*.25,0,0,Math.PI*2);ctx.stroke();}
      }
      // Longitude lines
      for(let i=0;i<4;i++){
        const a=angle+i*(Math.PI/4);
        ctx.beginPath();ctx.ellipse(cx,cy,r*Math.abs(Math.cos(a)),r,.3+a,0,Math.PI*2);ctx.stroke();
      }
      angle+=.005;
      requestAnimationFrame(draw);
    };
    draw();
  },[]);
  return <canvas ref={ref} style={{width:200,height:200,opacity:.75}}/>;
}

<script type="text/babel">
const AI_RULES=[
  {kw:['ai','llm','rag','ml','gpt'],tags:['LLM','Python','Groq'],reply:"Found projects where I worked with AI, LLMs, and Retrieval-Augmented Generation."},
  {kw:['backend','java','spring','api','microservice'],tags:['Java','Spring Boot'],reply:"Here are my backend-heavy projects — Java, Spring Boot, microservices."},
  {kw:['frontend','react','next','ui','three'],tags:['React','TypeScript','Next.js','Three.js'],reply:"Here are the frontend and UI-heavy projects using React, Next.js, Three.js."},
  {kw:['cloud','gcp','kubernetes','docker'],tags:['GCP','Kubernetes','Docker'],reply:"Showing cloud-native and DevOps-focused work."},
];
function matchQ(q){const ql=q.toLowerCase();for(const r of AI_RULES)if(r.kw.some(k=>ql.includes(k)))return r;return{tags:[],reply:`Showing all projects — no match for "${q}". Try "AI", "backend", or "cloud".`};}

function useTypewriter(text,speed=25){
  const [d,setD]=useState('');
  useEffect(()=>{setD('');if(!text)return;let i=0;const id=setInterval(()=>{setD(text.slice(0,++i));if(i>=text.length)clearInterval(id);},speed);return()=>clearInterval(id);},[text]);
  return d;
}

const SC={'In Progress':'s-wip','Shipped':'s-ship','Live':'s-live'};

function ProjCard({p,hl}){
  const [tilt,setTilt]=useState({x:0,y:0});
  const onMM=e=>{const r=e.currentTarget.getBoundingClientRect();setTilt({x:((e.clientY-r.top)/r.height-.5)*8,y:-((e.clientX-r.left)/r.width-.5)*8});};
  const onML=()=>setTilt({x:0,y:0});
  return(
    <div onMouseMove={onMM} onMouseLeave={onML}
      style={{transform:`perspective(600px) rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)`,transition:'transform .1s',height:'100%'}}>
      <div className={`card card-glow`} style={{padding:'1.5rem',height:'100%',display:'flex',flexDirection:'column',gap:'1rem',border:`1px solid ${hl?'var(--acc)':'var(--bdr)'}`,boxShadow:hl?'0 0 30px var(--adim)':'none'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span className={`status ${SC[p.status]||'s-wip'}`}><span className="sdot"/>{p.status}</span>
          <span style={{fontFamily:'DM Mono,monospace',fontSize:'.55rem',color:'var(--dim)'}}>P{String(p.id).padStart(2,'0')}</span>
        </div>
        <div>
          <h3 style={{fontWeight:700,fontSize:'1rem',letterSpacing:'-.01em',marginBottom:'.5rem'}}>{p.title}</h3>
          <p style={{color:'var(--sub)',fontSize:'.875rem',lineHeight:1.75,flex:1}}>{p.des}</p>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'.4rem',marginTop:'auto'}}>
          {p.tags.map(t=><span key={t} className="tag">{t}</span>)}
        </div>
        <div style={{display:'flex',gap:'1rem',paddingTop:'.75rem',borderTop:'1px solid var(--bdr)',flexWrap:'wrap'}}>
          {p.live&&<a href={p.live} style={{fontFamily:'DM Mono,monospace',fontSize:'.63rem',color:'var(--grn)',letterSpacing:'.06em'}}>↗ Launch</a>}
          {p.github&&<a href={p.github} target="_blank" rel="noopener noreferrer" style={{fontFamily:'DM Mono,monospace',fontSize:'.63rem',color:'var(--dim)',letterSpacing:'.06em'}}>GitHub ↗</a>}
          {p.internal&&<span style={{fontFamily:'DM Mono,monospace',fontSize:'.6rem',color:'var(--dim)',fontStyle:'italic'}}>Internal · not public</span>}
        </div>
      </div>
    </div>
  );
}

function Projects(){
  const [q,setQ]=useState('');const [sub,setSub]=useState('');const [reply,setReply]=useState('');const [tags,setTags]=useState([]);const [thinking,setThinking]=useState(false);
  const typed=useTypewriter(reply);
  const ask=(val=q)=>{if(!val.trim())return;setSub(val);setReply('');setThinking(true);setTimeout(()=>{const r=matchQ(val);setThinking(false);setTags(r.tags);setReply(r.reply);},700);};
  const chips=['AI & LLM','Backend / Java','Cloud & GCP','Frontend'];
  const shown=tags.length?PROJECTS.filter(p=>p.tags.some(t=>tags.includes(t))):PROJECTS;
  return(
    <section className="sec" id="projects" style={{borderTop:'1px solid var(--bdr)'}}>
      <div className="wrap">
        <h2 className="sh">Things I&apos;ve <em>Built</em></h2>
        <p className="sp">From enterprise travel tech to personal experiments</p>

        {/* AI Search */}
        <div style={{maxWidth:'42rem',margin:'2.5rem auto 0',padding:'0 1rem'}}>
          <div style={{position:'relative',borderRadius:14,border:'1px solid var(--bdr)',background:'var(--card)',padding:'.75rem 1rem',display:'flex',gap:'.75rem',alignItems:'center'}}>
            <div style={{display:'flex',gap:3,flexShrink:0}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:'50%',background:'var(--acc)',opacity:thinking?1:.4,animation:thinking?`pulse ${.6+i*.2}s ease-in-out infinite alternate`:''}}/>)}
            </div>
            <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ask()}
              placeholder='Ask about my projects... e.g. "show me AI projects"'
              style={{flex:1,background:'none',border:'none',color:'var(--tx)',fontSize:'.875rem',outline:'none'}}/>
            <button onClick={()=>ask()} style={{background:'none',border:'none',color:'var(--acc)',fontFamily:'DM Mono,monospace',fontSize:'.7rem',letterSpacing:'.06em'}}>Ask →</button>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'.5rem',marginTop:'.75rem',justifyContent:'center'}}>
            {chips.map(c=><button key={c} onClick={()=>{setQ(c);ask(c);}} style={{fontFamily:'DM Mono,monospace',fontSize:'.65rem',padding:'.3rem .8rem',border:'1px solid var(--bdr)',borderRadius:999,background:'none',color:'var(--dim)',cursor:'pointer'}}>
              {c}
            </button>)}
            {sub&&<button onClick={()=>{setQ('');setSub('');setReply('');setTags([]);}} style={{fontFamily:'DM Mono,monospace',fontSize:'.65rem',padding:'.3rem .8rem',border:'1px solid var(--bdr)',borderRadius:999,background:'none',color:'var(--dim)',cursor:'pointer'}}>✕ Clear</button>}
          </div>
          {(thinking||typed)&&(
            <div style={{marginTop:'.75rem',display:'flex',gap:'.75rem',padding:'.75rem 1rem',background:'var(--adim)',border:'1px solid var(--bdr)',borderRadius:10,alignItems:'flex-start'}}>
              <div style={{width:24,height:24,borderRadius:'50%',background:'var(--adim)',border:'1px solid var(--acc)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:'var(--acc)'}}/>
              </div>
              <p style={{fontSize:'.85rem',color:'var(--sub)',lineHeight:1.7}}>{thinking?<span style={{color:'var(--dim)'}}>Thinking...</span>:typed}</p>
            </div>
          )}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'1.25rem',maxWidth:'62rem',margin:'2rem auto 0',padding:'0 1rem'}}>
          {shown.map((p,i)=><ProjCard key={p.id} p={p} hl={tags.length>0&&p.tags.some(t=>tags.includes(t))} index={i}/>)}
        </div>
      </div>
      <style>{`@keyframes pulse{from{opacity:.3}to{opacity:1}}`}</style>
    </section>
  );
}

Object.assign(window,{Projects,ProjCard});
</script>

                  <a href={h.link} target="_blank" rel="noopener noreferrer" style={{fontFamily:'DM Mono,monospace',fontSize:'.63rem',color:'var(--dim)',display:'flex',alignItems:'center',gap:'.4rem'}}>↗ {h.ll}</a>
                </div>
              ))}
            </div>
            <CollabMatcher/>
            <p style={{fontFamily:'DM Mono,monospace',fontSize:'.7rem',color:'var(--dim)',marginTop:'2rem',lineHeight:1.9,fontStyle:'italic',textAlign:'center'}}>
              "The same discipline that holds a raga together holds a system together — precision, patience, and the courage to improvise."
            </p>
          </div>
        </div>
      </div>
    </section>
  );
}

function Footer(){
  const [form,setForm]=useState({name:'',email:'',message:''});
  const [st,setSt]=useState('idle');
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const submit=async e=>{e.preventDefault();if(!form.name||!form.email||!form.message)return;setSt('sending');await new Promise(r=>setTimeout(r,1100));setSt('sent');};
  const socials=[
    {l:'GitHub',h:ME.github,ico:<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>},
    {l:'LinkedIn',h:ME.linkedin,ico:<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>},
    {l:'X',h:ME.twitter,ico:<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>},
  ];
  return(
    <footer id="contact" style={{borderTop:'1px solid var(--bdr)',paddingBottom:'3rem'}}>
      <div style={{width:'100%',height:1,background:'linear-gradient(to right,transparent,var(--bdhi),transparent)',marginBottom:'4rem'}}/>
      <div className="wrap">
        <h2 className="sh">Let&apos;s <em>Connect</em></h2>
        <p className="sp">Have a project in mind, or just want to say hi? Drop me a message.</p>
        <div style={{maxWidth:'32rem',margin:'2.5rem auto 0'}}>
          {st==='sent'?(
            <div style={{textAlign:'center',padding:'3rem',border:'1px solid var(--bdr)',borderRadius:14}}>
              <div style={{fontSize:'2rem',color:'var(--acc)',marginBottom:'.75rem'}}>✓</div>
              <p style={{fontWeight:600,marginBottom:'.5rem'}}>Message sent!</p>
              <p style={{color:'var(--sub)',fontSize:'.875rem'}}>I'll get back to you within 24 hours.</p>
              <button onClick={()=>{setSt('idle');setForm({name:'',email:'',message:''}); }} style={{marginTop:'1.5rem',fontFamily:'DM Mono,monospace',fontSize:'.65rem',color:'var(--dim)',background:'none',border:'none',cursor:'pointer'}}>Send another →</button>
            </div>
          ):(
            <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}} className="form-row">
                <div><label className="flabel">Name</label><input className="finput" value={form.name} onChange={set('name')} placeholder="John Doe" required/></div>
                <div><label className="flabel">Email</label><input className="finput" type="email" value={form.email} onChange={set('email')} placeholder="john@example.com" required/></div>
              </div>
              <div><label className="flabel">Message</label><textarea className="finput" rows={4} value={form.message} onChange={set('message')} placeholder="Hi Himanshu, I'd love to work together on..." required/></div>
              <button type="submit" disabled={st==='sending'} style={{background:'linear-gradient(to right,var(--acc),var(--vio))',color:'#fff',border:'none',borderRadius:10,padding:'.9rem',fontWeight:600,fontSize:'.9rem',cursor:'pointer',opacity:st==='sending'?.6:1}}>
                {st==='sending'?'Sending...':'Send Message →'}
              </button>
            </form>
          )}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'4rem',paddingTop:'2rem',borderTop:'1px solid var(--bdr)',flexWrap:'wrap',gap:'1rem'}}>
          <p style={{fontFamily:'DM Mono,monospace',fontSize:'.62rem',color:'var(--dim)'}}>© 2026 Himanshu Mishra · Built with Next.js &amp; coffee</p>
          <div style={{display:'flex',gap:'.75rem'}}>
            {socials.map(s=>(
              <a key={s.l} href={s.h} target="_blank" rel="noopener noreferrer" aria-label={s.l}
                style={{width:42,height:42,border:'1px solid var(--bdr)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dim)',transition:'all .2s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--acc)';e.currentTarget.style.color='var(--acc)';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--bdr)';e.currentTarget.style.color='var(--dim)';}}>
                {s.ico}
              </a>
            ))}
          </div>
        </div>
      </div>
    </footer>
  );
}

Object.assign(window,{Experience,Music,Footer,GuitarHolo,CollabMatcher});
</script>

<!-- ── App ─────────────────────────────────────────────────────────────────── -->
<script type="text/babel">
function Tweaks({theme,setTheme,accent,setAccent}){
  return(
    <div className="twp">
      <div className="twh">◈ Tweaks</div>
      <div className="twr"><span className="twl">Theme</span><button className="toggle" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} aria-label="Toggle"/></div>
      <div className="twr">
        <span className="twl">Accent</span>
        <div style={{display:'flex',gap:'.4rem'}}>
          {Object.entries(ACCENTS).map(([k,v])=>(
            <button key={k} className={`sw${accent===k?' on':''}`} style={{background:v.sw,width:18,height:18,border:'2px solid transparent',borderRadius:'50%'}} onClick={()=>setAccent(k)} title={k}/>
          ))}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [theme,setTheme]=useState(TWEAK_DEFAULTS.theme||'dark');
  const [accent,setAccent]=useState(TWEAK_DEFAULTS.accent||'rose');
  const [tweaks,setTweaks]=useState(false);

  useEffect(()=>{ document.documentElement.setAttribute('data-theme',theme); },[theme]);

  useEffect(()=>{
    const a=ACCENTS[accent];
    const r=document.documentElement.style;
    r.setProperty('--acc',theme==='dark'?a.dark:a.light);
    r.setProperty('--adim',a.sw+'20');
  },[accent,theme]);

  useEffect(()=>{
    const bar=document.getElementById('spbar');
    const fn=()=>{const{scrollTop,scrollHeight,clientHeight}=document.documentElement;bar&&(bar.style.width=(scrollTop/(scrollHeight-clientHeight)*100)+'%');};
    window.addEventListener('scroll',fn,{passive:true});
    return()=>window.removeEventListener('scroll',fn);
  },[]);

  useEffect(()=>{
    const h=e=>{if(e.data?.type==='__activate_edit_mode')setTweaks(true);if(e.data?.type==='__deactivate_edit_mode')setTweaks(false);};
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  useEffect(()=>{ window.parent.postMessage({type:'__edit_mode_set_keys',edits:{theme,accent}},'*'); },[theme,accent]);

  return(
    <>
      <Nav toggleTheme={()=>setTheme(t=>t==='dark'?'light':'dark')}/>
      <main>
        <Hero/><About/><Projects/><Experience/><Music/><Footer/>
      </main>
      {tweaks&&<Tweaks theme={theme} setTheme={setTheme} accent={accent} setAccent={setAccent}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
